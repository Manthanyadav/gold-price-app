<!DOCTYPE html>
<html>
<head>
    <title>Gold AI Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        .header {
            padding: 20px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 20px;
            width: 350px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }

        .price {
            font-size: 40px;
            margin-top: 10px;
            color: gold;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, gold, orange);
            font-weight: bold;
            cursor: pointer;
        }

        canvas {
            width: 100% !important;
            height: 300px !important;
        }
    </style>
</head>

<body>

<div class="header">
    💰 Gold AI Dashboard
</div>

<div class="container">

    <!-- Live Price -->
    <div class="card">
        <h2>Live Gold Price</h2>
        <div class="price">₹ <span id="price">{{ live_price }}</span></div>
    </div>

    <!-- Prediction -->
    <div class="card">
        <h2>🔮 Gold Prediction</h2>

        <form action="/predict" method="post">
            <input type="text" name="Open" placeholder="Open Price">
            <input type="text" name="High" placeholder="High Price">
            <input type="text" name="Low" placeholder="Low Price">
            <button type="submit">Predict Now</button>
        </form>
    </div>

    <!-- ALERT BOX -->
    <div class="card">
        <h2>🔔 Set Alert</h2>
        <input type="number" id="alertPrice" placeholder="Enter alert price">
        <button onclick="setAlert()">Set Alert</button>
    </div>

</div>

<!-- Chart -->
<div class="container">
    <div class="card" style="width: 80%;">
        <h2>📈 Live Price Chart</h2>
        <canvas id="goldChart"></canvas>
    </div>
</div>

<script>
let prices = [];
let labels = [];

const ctx = document.getElementById("goldChart").getContext("2d");

const chart = new Chart(ctx, {
    type: "line",
    data: {
        labels: labels,
        datasets: [{
            label: "Gold Price",
            data: prices,
            borderColor: "gold",
            borderWidth: 2
        }]
    }
});

// 🔥 FETCH + ALERT + UPDATE
async function fetchPrice() {
    try {
        const res = await fetch("/live-price");
        const data = await res.json();

        document.getElementById("price").innerText = data.price;

        // chart update
        labels.push(new Date().toLocaleTimeString());
        prices.push(data.price);

        if (labels.length > 10) {
            labels.shift();
            prices.shift();
        }

        chart.update();

        // 🚨 ALERT POPUP
        if (data.alerts.length > 0) {
            data.alerts.forEach(a => {
                alert("🚨 Gold Price Reached ₹" + a);

                if (Notification.permission === "granted") {
                    new Notification("Gold Alert 🚨", {
                        body: "Price reached ₹" + a
                    });
                }
            });
        }

    } catch (e) {
        console.error(e);
    }
}

// 🔔 SET ALERT
function setAlert() {
    let price = document.getElementById("alertPrice").value;

    fetch('/set-alert', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: "price=" + price
    })
    .then(res => res.json())
    .then(data => alert(data.message));
}

// notification permission
if (Notification.permission !== "granted") {
    Notification.requestPermission();
}

// auto refresh
setInterval(fetchPrice, 4000);
fetchPrice();

</script>

</body>
</html>
